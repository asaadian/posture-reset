# pubspec.yaml
name: posture_reset
description: "Posture Reset - a dashboard-first recovery app for posture, mobility, and short guided recovery sessions."
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.0
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.0.2
  supabase_flutter: ^2.12.1
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/body_map/front.png
    - assets/images/body_map/back.png